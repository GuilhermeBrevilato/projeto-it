projeto_it:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: "{{ env_var('BQ_DATASET_STAGING') }}"
      keyfile: /secrets/gcp-key.json
      location: "{{ env_var('BQ_LOCATION') }}"
      threads: 4
      timeout_seconds: 300
      priority: interactive